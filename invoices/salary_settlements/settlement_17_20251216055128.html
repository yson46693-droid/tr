<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة تسوية مرتب - SETT-20251216-0017</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 30%, #60a5fa 60%, #93c5fd 100%);
            padding: 20px;
            color: #1e293b;
        }
        .invoice-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .invoice-header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 30%, #60a5fa 60%, #93c5fd 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .invoice-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .invoice-header .invoice-number {
            font-size: 18px;
            opacity: 0.9;
        }
        .invoice-body {
            padding: 30px;
        }
        .info-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border-right: 4px solid #3b82f6;
        }
        .info-box label {
            display: block;
            font-size: 12px;
            color: #64748b;
            margin-bottom: 5px;
        }
        .info-box .value {
            font-size: 18px;
            font-weight: bold;
            color: #1e293b;
        }
        .amounts-table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .amounts-table th {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white;
            padding: 15px;
            text-align: right;
            font-weight: 600;
        }
        .amounts-table td {
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
        }
        .amounts-table tr:last-child td {
            border-bottom: none;
        }
        .amount-primary { color: #3b82f6; font-weight: bold; }
        .amount-success { color: #10b981; font-weight: bold; }
        .amount-warning { color: #f59e0b; font-weight: bold; }
        .notes-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 8px;
            border-right: 4px solid #10b981;
        }
        .notes-section h3 {
            color: #1e293b;
            margin-bottom: 10px;
        }
        .footer {
            padding: 20px 30px;
            background: #f8fafc;
            text-align: center;
            color: #64748b;
            font-size: 12px;
        }
        @media print {
            body { background: white; padding: 0; }
            .invoice-container { box-shadow: none; }
        }
    </style>
</head>
<body>
    <div class="invoice-container">
        <div class="invoice-header">
            <h1>فاتورة تسوية مرتب موظف</h1>
            <div class="invoice-number">رقم الفاتورة: SETT-20251216-0017</div>
        </div>
        <div class="invoice-body">
            <div class="info-section">
                <div class="info-box">
                    <label>الموظف</label>
                    <div class="value">انتاج 2</div>
                </div>
                <div class="info-box">
                    <label>تاريخ التسوية</label>
                    <div class="value">16/12/2025</div>
                </div>
                <div class="info-box">
                    <label>نوع التسوية</label>
                    <div class="value">تسوية جزئية</div>
                </div>
                <div class="info-box">
                    <label>من قام بالتسوية</label>
                    <div class="value">Mohamed elsyed</div>
                </div>
            </div>
            
            <table class="amounts-table">
                <thead>
                    <tr>
                        <th>الوصف</th>
                        <th>المبلغ</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>المبلغ التراكمي السابق</strong></td>
                        <td class="amount-primary">4,321.60 ج.م</td>
                    </tr>
                    <tr>
                        <td><strong>المبلغ المسدد</strong></td>
                        <td class="amount-success">1,000.00 ج.م</td>
                    </tr>
                    <tr>
                        <td><strong>المتبقي بعد التسوية</strong></td>
                        <td class="amount-warning">1,521.60 ج.م</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="footer">
            <p>شركة البركة - 2025</p>
            <p>تم إنشاء هذه الفاتورة تلقائياً من النظام</p>
        </div>
    </div>
</body>
</html>
